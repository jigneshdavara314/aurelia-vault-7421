name: btcbot tick

on:
  schedule:
    - cron: "*/15 * * * *"   # GitHub's internal cron (best-effort; often throttled
                             # to 1-3h cadence under load). Kept as a fallback.
  repository_dispatch:        # External scheduler (cron-job.org) hits this every
    types: [bot-tick]         # 5 min to bypass GitHub's cron throttling.
  workflow_dispatch:        # allows manual "Run workflow" from the Actions tab
  push:
    branches: [main]
    paths:
      - ".github/workflows/bot.yml"
      - "btcbot/**"
      - "run.py"
      - "settings.json"

concurrency:
  group: btcbot-tick
  cancel-in-progress: false   # never cancel a tick mid-write; queue instead

permissions:
  contents: write             # commit trades.db back to the repo
  pages: write
  id-token: write

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize DB if missing
        run: |
          if [ ! -f trades.db ]; then
            python run.py init
          fi

      - name: Run one trade + resolve cycle
        env:
          MODE: PAPER
        run: |
          python run.py trade || true
          python run.py resolve || true

      - name: Take daily snapshot (idempotent)
        run: python run.py snapshot-day || true

      - name: Self-improvement nightly job (idempotent within day)
        run: python run.py self-improve || true

      - name: Strategy discovery (idempotent within day)
        run: python run.py discover || true

      - name: Pattern mining HEAVY (daily, 21 families x 3 timeframes)
        run: python run.py mine-patterns || true

      - name: Pattern mining LIGHT (every tick, composite predicates only)
        run: python run.py mine-patterns --light || true

      - name: Write daily edge report
        run: python run.py daily-report || true

      - name: Health check (writes health.json; non-fatal)
        run: python run.py health-check || true

      - name: Render static dashboard
        run: python dashboard.py --write

      - name: Show status (for the run log)
        run: python run.py status

      - name: Commit state back to repo (with merge-conflict-proof strategy)
        run: |
          set -e
          git config user.name  "btcbot[bot]"
          git config user.email "btcbot@users.noreply.github.com"
          # Register the 'merge=ours' driver referenced in .gitattributes.
          # This makes git keep OUR version of generated state files on every
          # merge/rebase, with NO conflict markers ever inserted.
          git config merge.ours.driver true

          # Stage and commit our generated state ONCE
          git add -f trades.db dashboard.html
          [ -f strategy_state.json ] && git add -f strategy_state.json || true
          [ -f self_improve_log.jsonl ] && git add -f self_improve_log.jsonl || true
          [ -f predictions.jsonl ] && git add -f predictions.jsonl || true
          [ -f discoveries.json ] && git add -f discoveries.json || true
          [ -f discovery_log.jsonl ] && git add -f discovery_log.jsonl || true
          [ -f patterns.json ] && git add -f patterns.json || true
          [ -f pattern_log.jsonl ] && git add -f pattern_log.jsonl || true
          [ -d reports ] && git add -f reports/ || true
          [ -f health.json ] && git add -f health.json || true
          git add -f settings.json
          if git diff --cached --quiet; then
            echo "no changes to commit"; exit 0
          fi
          git commit -m "tick: $(date -u +'%Y-%m-%d %H:%M UTC')"

          # Push with merge-conflict-proof rebase. If rebase has conflicts on
          # generated artifacts (dashboard.html, trades.db, patterns.json,
          # discoveries.json, strategy_state.json, health.json) — these are
          # state files where OUR copy is the freshest valid truth, so we
          # force-take ours via -Xours. Logs are append-only.
          for i in 1 2 3; do
            if git pull --rebase -Xours --autostash origin main 2>&1; then
              if git push 2>&1; then
                echo "push succeeded on attempt $i"
                exit 0
              fi
            else
              echo "rebase had a conflict — aborting and force-resolving"
              git rebase --abort || true
              # Force-take REMOTE on code/text files, force-take OURS on artifacts
              git fetch origin
              git reset --hard origin/main
              echo "reset to origin; will re-stage our artifacts in next loop"
              # Re-stage and re-commit our artifacts (now on top of clean main)
              git add -f trades.db dashboard.html settings.json
              [ -f strategy_state.json ] && git add -f strategy_state.json || true
              [ -f self_improve_log.jsonl ] && git add -f self_improve_log.jsonl || true
              [ -f predictions.jsonl ] && git add -f predictions.jsonl || true
              [ -f discoveries.json ] && git add -f discoveries.json || true
              [ -f discovery_log.jsonl ] && git add -f discovery_log.jsonl || true
              [ -f patterns.json ] && git add -f patterns.json || true
              [ -f pattern_log.jsonl ] && git add -f pattern_log.jsonl || true
              [ -d reports ] && git add -f reports/ || true
              [ -f health.json ] && git add -f health.json || true
              if ! git diff --cached --quiet; then
                git commit -m "tick (force-resolved): $(date -u +'%Y-%m-%d %H:%M UTC')"
              fi
            fi
            echo "push attempt $i failed, retrying..."
            sleep 5
          done
          echo "push failed after 3 retries (non-fatal)"

      - name: Verify dashboard.html has no merge markers
        run: |
          if grep -E "^(<<<<<<<|=======|>>>>>>>)" dashboard.html > /dev/null 2>&1; then
            echo "FATAL: dashboard.html contains merge conflict markers"
            grep -n "^(<<<<<<<|=======|>>>>>>>)" dashboard.html | head -5
            # Regenerate cleanly and commit a fix
            python dashboard.py --write
            git add -f dashboard.html
            git commit -m "fix: regenerate dashboard.html (had merge markers)" || true
            git push || true
          else
            echo "dashboard.html is clean"
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: tick
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
