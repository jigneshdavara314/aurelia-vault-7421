name: btcbot tick

on:
  schedule:
    - cron: "*/15 * * * *"   # every 15m. 3 ticks per 5m candle close — enough
                             # to never miss a close, gated by already_open so
                             # extra ticks within the same candle are no-ops.
  workflow_dispatch:        # allows manual "Run workflow" from the Actions tab
  push:
    branches: [main]
    paths:
      - ".github/workflows/bot.yml"
      - "btcbot/**"
      - "run.py"
      - "settings.json"

concurrency:
  group: btcbot-tick
  cancel-in-progress: false   # never cancel a tick mid-write; queue instead

permissions:
  contents: write             # commit trades.db back to the repo
  pages: write
  id-token: write

jobs:
  tick:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Initialize DB if missing
        run: |
          if [ ! -f trades.db ]; then
            python run.py init
          fi

      - name: Run one trade + resolve cycle
        env:
          MODE: PAPER
        run: |
          python run.py trade || true
          python run.py resolve || true

      - name: Take daily snapshot (idempotent)
        run: python run.py snapshot-day || true

      - name: Self-improvement nightly job (idempotent within day)
        run: python run.py self-improve || true

      - name: Strategy discovery (idempotent within day)
        run: python run.py discover || true

      - name: Pattern mining (idempotent within day)
        run: python run.py mine-patterns || true

      - name: Write daily edge report
        run: python run.py daily-report || true

      - name: Health check (writes health.json; non-fatal)
        run: python run.py health-check || true

      - name: Render static dashboard
        run: python dashboard.py --write

      - name: Show status (for the run log)
        run: python run.py status

      - name: Commit DB + dashboard back to repo
        run: |
          git config user.name  "btcbot[bot]"
          git config user.email "btcbot@users.noreply.github.com"
          git add -f trades.db dashboard.html
          if [ -f strategy_state.json ]; then git add -f strategy_state.json; fi
          if [ -f self_improve_log.jsonl ]; then git add -f self_improve_log.jsonl; fi
          if [ -f predictions.jsonl ]; then git add -f predictions.jsonl; fi
          if [ -f discoveries.json ]; then git add -f discoveries.json; fi
          if [ -f discovery_log.jsonl ]; then git add -f discovery_log.jsonl; fi
          if [ -f patterns.json ]; then git add -f patterns.json; fi
          if [ -f pattern_log.jsonl ]; then git add -f pattern_log.jsonl; fi
          if [ -d reports ]; then git add -f reports/; fi
          if [ -f health.json ]; then git add -f health.json; fi
          git add -f settings.json
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "tick: $(date -u +'%Y-%m-%d %H:%M UTC')"
            for i in 1 2 3; do
              git pull --rebase --autostash origin main && git push && exit 0
              echo "push attempt $i failed, retrying..."
              sleep 5
            done
            echo "push failed after 3 retries (non-fatal)"
          fi

      - name: Prepare Pages artifact
        run: |
          mkdir -p _site
          cp dashboard.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy-pages:
    needs: tick
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
